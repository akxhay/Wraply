<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Wrapper Admin — Configs</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Alpine & (optional) Bootstrap JS for modal kept) -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: #1f2937;
    }
    .shell {
      width: 100%;
      max-width: 1100px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      padding: 28px;
      animation: fadeIn .6s ease-in-out;
    }
    .shell-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
    }
    .subtitle {
      font-size: 14px;
      color: #6b7280;
    }
    .btn-primary-gradient {
      display: inline-block;
      padding: 12px 20px;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border: 0;
      border-radius: 12px;
      transition: all .3s ease;
      box-shadow: 0 8px 20px rgba(79,70,229,0.3);
    }
    .btn-primary-gradient:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(79,70,229,0.4); }
    .btn-primary-gradient:active { transform: translateY(-1px); }

    .card-like {
      background: #fff;
      border-radius: 14px;
      border: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      padding: 16px;
    }
    table thead th { color: #6b7280; font-weight: 600; }

    /* Toggle switch (kept from original) */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #ef4444;
      transition: .3s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #22c55e; }
    input:checked + .slider:before { transform: translateX(22px); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px);} to { opacity: 1; transform: translateY(0);} }

    /* Responsive */
    @media (max-width: 768px) {
      .shell { padding: 18px; }
      .title { font-size: 22px; }
      .shell-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .table-responsive { overflow-x: auto; }
    }
  </style>
</head>
<body x-data="app()">
  <div class="shell">
    <div class="shell-header">
      <div>
        <div class="title">API Wrapper Admin</div>
        <div class="subtitle">Manage and configure your API environment</div>
      </div>
      <button class="btn-primary-gradient" @click="openCreate()">+ New Config</button>
    </div>

    <div class="card-like">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Id</th>
              <th>Name</th>
              <th>Method</th>
              <th>Endpoint</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="c in configs" :key="c.id">
              <tr>
                <td x-text="c.id"></td>
                <td x-text="c.name"></td>
                <td><span class="badge text-bg-dark" x-text="c.method"></span></td>
                <td x-text="c.url"></td>
                <td>
                  <label class="switch">
                    <input type="checkbox" :checked="c.enabled" @change="toggle(c)">
                    <span class="slider"></span>
                  </label>
                </td>
                <td class="d-flex gap-2">
                  <button class="btn btn-sm btn-outline-primary" @click="edit(c)">Edit</button>
                  <button class="btn btn-sm btn-outline-success" @click="execute(c.id)">Run</button>
                  <button class="btn btn-sm btn-outline-danger" @click="remove(c.id)">Delete</button>
                  <button class="btn btn-sm btn-outline-secondary" @click="cloneConfig(c.id)">Clone</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <div class="mt-3 subtitle">Secure • Fast • Centralized Control</div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="configModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Config</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input class="form-control mb-2" placeholder="Name" x-model="form.name" required>
          <input class="form-control mb-2" placeholder="Full URL (https://api.example.com/users)"
                 x-model="form.url" type="url" required>
          <select class="form-control mb-2" x-model="form.method">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
          </select>
          <label>Headers (JSON)</label>
          <textarea class="form-control mb-3" rows="3" x-model="form.headers"></textarea>
          <label>Response Mapping (JSON)</label>
          <textarea class="form-control" rows="3" x-model="form.response_mapping"></textarea>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" @click="save()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function app(){
      return {
        configs: [],
        form: {},
        modal: null,
        init(){
          this.modal = new bootstrap.Modal(document.getElementById('configModal'));
          this.fetchConfigs();
        },
        async fetchConfigs(){
          let res = await fetch('/configs');
          this.configs = await res.json();
        },
        openCreate(){
          this.form = {method: 'GET', headers: '{}', response_mapping: '{}'};
          this.modal.show();
        },
        edit(c){
          this.form = JSON.parse(JSON.stringify(c));
          this.modal.show();
        },
        async cloneConfig(id){
          await fetch(`/configs/${id}/clone`, { method: 'POST' });
          this.fetchConfigs();
        },

        async save(){
          const name = (this.form.name || '').trim();
          const url  = (this.form.url  || '').trim();
          if(!name || !url){ alert('Name and URL are required.'); return; }
          try { new URL(url); } catch(e){ alert('Please enter a valid URL.'); return; }

          const method = this.form.id ? 'PUT' : 'POST';
          const endpoint = this.form.id ? `/configs/${this.form.id}` : '/configs';
          await fetch(endpoint,{ method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(this.form) });
          this.modal.hide();
          this.fetchConfigs();
        },
        async remove(id){
          if(!confirm('Delete config?')) return;
          await fetch(`/configs/${id}`, { method: 'DELETE' });
          this.fetchConfigs();
        },
        async execute(id){
          let res = await fetch(`/execute/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}'
          });
          alert(JSON.stringify(await res.json(), null, 2));
        },
        async toggle(config){
          await fetch(`/configs/${config.id}/toggle`, { method: 'PATCH' });
          config.enabled = !config.enabled;
        }
      }
    }
  </script>
</body>
</html>
