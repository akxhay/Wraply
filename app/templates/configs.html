<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wraply Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body {
            background:#f6f8fb;
        }

        .card {
            border:none;
            border-radius:14px;
            box-shadow:0 8px 20px rgba(0,0,0,.05);
        }

        .header {
            font-weight:700;
            font-size:22px;
        }

        .badge-enabled {
            background:#22c55e;
        }

        .badge-disabled {
            background:#ef4444;
        }

        textarea {
            font-family: monospace;
        }

        .switch {
          position: relative;
          display: inline-block;
          width: 44px;
          height: 22px;
        }

        .switch input {
          opacity: 0;
          width: 0;
          height: 0;
        }

        .slider {
          position: absolute;
          cursor: pointer;
          inset: 0;
          background-color: #ef4444;
          transition: .3s;
          border-radius: 34px;
        }

        .slider:before {
          position: absolute;
          content: "";
          height: 16px;
          width: 16px;
          left: 3px;
          bottom: 3px;
          background: white;
          transition: .3s;
          border-radius: 50%;
        }

        input:checked + .slider {
          background-color: #22c55e;
        }

        input:checked + .slider:before {
          transform: translateX(22px);
        }
    </style>

</head>

<body x-data="app()">

<div class="container py-5">

    <div class="d-flex justify-content-between mb-4">
        <div class="header">⚡ Wraply Config Dashboard</div>
        <button class="btn btn-primary" @click="openCreate()">+ New Config</button>
    </div>

    <div class="card p-4">
        <table class="table align-middle">
            <thead>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Method</th>
                <th>Endpoint</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <template x-for="c in configs" :key="c.id">
                <tr>
                    <td x-text="c.id"></td>
                    <td x-text="c.name"></td>
                    <td><span class="badge bg-dark" x-text="c.method"></span></td>
                    <td x-text="c.url"></td>

                    <td>
                        <label class="switch">
                            <input type="checkbox"
                                   :checked="c.enabled"
                                   @change="toggle(c)">
                            <span class="slider"></span>
                        </label>
                    </td>

                    <td>
                        <button class="btn btn-sm btn-outline-primary"
                                @click="edit(c)">Edit</button>

                        <button class="btn btn-sm btn-outline-success"
                                @click="execute(c.id)">Run</button>

                        <button class="btn btn-sm btn-outline-danger"
                                @click="remove(c.id)">Delete</button>
                        <button class="btn btn-sm btn-outline-secondary"
                                @click="cloneConfig(c.id)">
                            Clone
                        </button>
                    </td>
                </tr>
            </template>
            </tbody>
        </table>
    </div>

</div>

<!-- MODAL -->

<div class="modal fade" id="configModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Config</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input class="form-control mb-2" placeholder="Name" x-model="form.name">
                <input class="form-control mb-2"
                       placeholder="Full URL (https://api.example.com/users)"
                       x-model="form.url">

                <select class="form-control mb-2" x-model="form.method">
                    <option>GET</option>
                    <option>POST</option>
                    <option>PUT</option>
                    <option>DELETE</option>
                </select>

                <label>Headers (JSON)</label>

                <textarea class="form-control mb-3" rows="3" x-model="form.headers"></textarea>

                <label>Response Mapping (JSON)</label>

                <textarea class="form-control" rows="3" x-model="form.response_mapping"></textarea>

            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" @click="save()">Save</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function app(){
    return {

    configs: [],
    form: {},
    modal:null,

    init(){
        this.modal = new bootstrap.Modal(document.getElementById('configModal'));
        this.fetchConfigs();
    },

    async fetchConfigs(){
        let res = await fetch('/configs');
        this.configs = await res.json();
    },

    openCreate(){
        this.form = {method:"GET",headers:"{}",response_mapping:"{}"};
        this.modal.show();
    },

    edit(c){
        this.form = JSON.parse(JSON.stringify(c));
        this.modal.show();
    },
    async cloneConfig(id){
        await fetch(`/configs/${id}/clone`, {
            method:'POST'
        });

        this.fetchConfigs();
    },

    async save(){
        let method = this.form.id ? 'PUT':'POST';
        let url = this.form.id ? `/configs/${this.form.id}`:'/configs';

        await fetch(url,{
            method:method,
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(this.form)
        });

        this.modal.hide();
        this.fetchConfigs();
    },

    async remove(id){
        if(!confirm("Delete config?")) return;
        await fetch(`/configs/${id}`,{method:'DELETE'});
        this.fetchConfigs();
    },

    async execute(id){
        let res = await fetch(`/execute/${id}`,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:'{}'
        });

        alert(JSON.stringify(await res.json(),null,2));
    },
    async toggle(config){
        await fetch(`/configs/${config.id}/toggle`, {
            method:'PATCH'
        });

        config.enabled = !config.enabled;
    }

    }
    }
</script>

</body>
</html>
