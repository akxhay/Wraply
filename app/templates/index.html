<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Wrapper Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0d0f14;
      --surface: #13161e;
      --border:  #252a38;
      --accent:  #00e5ff;
      --accent2: #7c3aed;
      --success: #00c896;
      --txt:     #e2e8f0;
      --muted:   #64748b;
      --mono:    'Space Mono', monospace;
      --sans:    'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Ambient glow blobs */
    .glow-1, .glow-2 {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,229,255,.07), transparent 70%);
      top: -100px; left: -100px;
      animation: drift1 12s ease-in-out infinite;
    }
    .glow-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,.08), transparent 70%);
      bottom: -80px; right: -80px;
      animation: drift2 15s ease-in-out infinite;
    }
    @keyframes drift1 {
      0%, 100% { transform: translate(0,0); }
      50%       { transform: translate(40px, 30px); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0,0); }
      50%       { transform: translate(-30px, -20px); }
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 52px 44px 44px;
      width: 100%; max-width: 420px;
      text-align: center;
      animation: slideUp .5s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* Top accent bar */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 16px 16px 0 0;
    }

    /* Tag */
    .tag {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--mono); font-size: 10px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--accent);
      background: rgba(0,229,255,.07);
      border: 1px solid rgba(0,229,255,.15);
      border-radius: 20px; padding: 5px 14px;
      margin-bottom: 28px;
    }
    .tag .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    h1 {
      font-family: var(--mono);
      font-size: 26px; font-weight: 700;
      letter-spacing: .02em; line-height: 1.2;
      margin-bottom: 12px;
    }
    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 14px; color: var(--muted);
      line-height: 1.6; margin-bottom: 36px;
    }

    /* Stats row */
    .stats {
      display: flex; justify-content: center; gap: 0;
      border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; margin-bottom: 32px;
    }
    .stat {
      flex: 1; padding: 14px 10px;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat .val {
      font-family: var(--mono); font-size: 18px; font-weight: 700;
      color: var(--accent); display: block;
    }
    .stat .lbl {
      font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); margin-top: 3px; display: block;
    }

    /* CTA button */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 15px 24px;
      background: var(--accent); color: #000;
      font-family: var(--mono); font-size: 13px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      text-decoration: none; border-radius: 10px;
      transition: all .25s; border: none; cursor: pointer;
      box-shadow: 0 0 24px rgba(0,229,255,.2);
    }
    .btn:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,229,255,.35);
    }
    .btn:active { transform: translateY(0); }
    .btn .arrow {
      transition: transform .25s;
    }
    .btn:hover .arrow { transform: translateX(4px); }

    /* Footer */
    .footer {
      margin-top: 28px;
      display: flex; align-items: center; justify-content: center; gap: 16px;
    }
    .footer span {
      font-size: 11px; color: var(--muted);
      font-family: var(--mono); letter-spacing: .06em;
      display: flex; align-items: center; gap: 5px;
    }
    .footer span::before {
      content: '//';
      color: var(--border);
    }

    @media (max-width: 480px) {
      .card { padding: 40px 24px 32px; }
      h1 { font-size: 21px; }
      .stats .val { font-size: 15px; }
    }
  </style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="card">
  <div class="tag">
    <span class="dot"></span>
    System Online
  </div>

  <h1>API<br/><span>Wrapper</span> Admin</h1>
  <p class="subtitle">Manage, transform, and proxy your API integrations from a single control panel.</p>

  <div class="stats">
    <div class="stat">
      <span class="val">∞</span>
      <span class="lbl">Configs</span>
    </div>
    <div class="stat">
      <span class="val">6</span>
      <span class="lbl">Transform types</span>
    </div>
    <div class="stat">
      <span class="val">0ms</span>
      <span class="lbl">Overhead</span>
    </div>
  </div>

  <a href="/configs/ui" class="btn">
    Open Config Portal
    <span class="arrow">→</span>
  </a>

  <div class="footer">
    <span>Secure</span>
    <span>Fast</span>
    <span>Centralized</span>
  </div>
</div>

</body>
</html>
