<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Wrapper Admin</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: #1f2937;
        }

        .container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.6s ease-in-out;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 35px;
        }

        .button {
            display: inline-block;
            padding: 14px 26px;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(79,70,229,0.3);
        }

        .button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(79,70,229,0.4);
        }

        .button:active {
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #9ca3af;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container {
                padding: 40px 25px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>API Wrapper Admin</h1>
    <p class="subtitle">Manage and configure your API environment</p>

    <a href="/configs/ui" class="button">Open Config Portal →</a>

    <div class="footer">
        Secure • Fast • Centralized Control
    </div>
</div>

</body>
</html>
